name: context-management
slug: context-management
version: 0.1.0
description: Install skills that help agents manage and compress context efficiently.
category: context-management
type: bundle
tags:
  - context
  - tokens
  - compression

# Skills installed from GitHub. Each entry maps to a repo and the skill paths within it.
# sourceType: github  → fetches raw files from github.com/<source>
skills:
  - name: caveman
    source: JuliusBrussee/caveman
    sourceType: github
    paths:
      - skills/caveman/SKILL.md
      - skills/cavecrew/SKILL.md
      - skills/caveman-commit/SKILL.md
      - skills/caveman-compress/SKILL.md
      - skills/caveman-help/SKILL.md
      - skills/caveman-review/SKILL.md
      - skills/caveman-stats/SKILL.md

postInstall:
  - description: "Install headroom CLI (headroomlabs-ai/headroom)"
    check: "command -v headroom"
    command: "uv tool install --python 3.13 'headroom-ai[all]'"

postUninstall:
  - description: "Remove headroom CLI"
    check: "command -v headroom"
    command: "uv tool uninstall headroom-ai"

compatibility:
  claude-code:
    type: bundle
    supported: true
    scripts:
      - scripts/install.py
  codex:
    supported: false
  opencode:
    supported: false

maintainer: anycat_blank
